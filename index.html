<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6558f5" />
    <meta
      name="description"
      content="参考画像を選ぶだけで画像生成AI向けプロンプトを組み立てられるツール"
    />
    <title>VisPrompt Studio</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .step-pill {
        display: none !important;
      }

      .hero {
        padding: clamp(34px, 5vw, 70px) 24px 56px;
      }

      .hero > h1 {
        font-size: clamp(34px, 5vw, 62px);
        letter-spacing: -0.04em;
      }

      .hero > p {
        margin: 18px 0 42px;
      }

      .type-icon {
        display: inline-grid;
        width: 50px;
        height: 50px;
        margin: 14px 0 13px;
        place-items: center;
        border: 1px solid rgba(101, 88, 245, 0.12);
        border-radius: 18px;
        background: linear-gradient(145deg, #f3f0ff 0%, #ffffff 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 10px 24px rgba(101, 88, 245, 0.1);
        color: var(--accent-dark);
        font-size: 0;
        line-height: 1;
      }

      .type-icon svg {
        width: 30px;
        height: 30px;
        display: block;
      }

      .type-icon svg * {
        vector-effect: non-scaling-stroke;
      }

      .image-card.text-only .compact-status {
        display: none;
      }

      .image-card.text-only {
        min-height: 96px;
      }

      .image-card.text-only .compact-choice {
        gap: 8px;
      }

      .prompt-options.enhanced {
        display: grid;
        gap: 8px;
        margin: 16px 0 14px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(250, 249, 255, 0.78);
      }

      .native-select-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      .choice-field {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        align-items: center;
        gap: 9px;
        border: 0;
        margin: 0;
        padding: 0;
      }

      .choice-title {
        display: block;
        font-size: 13px;
        font-weight: 900;
        color: var(--muted);
        white-space: nowrap;
      }

      .choice-title small {
        display: none;
      }

      .choice-grid,
      .choice-grid.format-grid {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 2px;
        scroll-padding-left: 2px;
        -webkit-overflow-scrolling: touch;
      }

      .choice-grid::-webkit-scrollbar {
        display: none;
      }

      .choice-button {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        text-align: center;
        cursor: pointer;
        transition: border-color .18s ease, background .18s ease, box-shadow .18s ease, color .18s ease;
      }

      .choice-button strong {
        font-size: 13px;
        font-weight: 900;
        line-height: 1;
      }

      .choice-button span {
        display: none;
      }

      .choice-button.active {
        border-color: var(--accent);
        background: var(--accent);
        box-shadow: 0 8px 18px rgba(101, 88, 245, 0.18);
        color: #fff;
      }

      .selected-summary {
        margin: -2px 0 14px;
        padding: 10px 12px;
        border-radius: 16px;
      }

      .selected-summary-head {
        margin-bottom: 8px;
      }

      .selected-summary-head small {
        display: none;
      }

      .selected-summary-actions {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .selected-summary-actions::-webkit-scrollbar {
        display: none;
      }

      .selected-chips.inline {
        min-height: 0;
        display: flex;
        flex-wrap: nowrap;
        gap: 7px;
        overflow-x: auto;
        padding-bottom: 2px;
        -webkit-overflow-scrolling: touch;
      }

      .selected-chips.inline::-webkit-scrollbar {
        display: none;
      }

      .selected-chips.inline .selected-chip {
        flex: 0 0 auto;
      }

      @media (max-width: 760px) {
        .site-header {
          height: 64px;
        }

        .hero {
          padding: 26px 16px 36px;
        }

        .eyebrow {
          margin-bottom: 10px;
        }

        .hero > h1 {
          font-size: clamp(31px, 8.8vw, 42px);
          line-height: 1.12;
        }

        .hero > h1 span::after {
          bottom: 1px;
          height: 7px;
        }

        .hero > p {
          margin: 14px 0 30px;
          font-size: 14px;
          line-height: 1.65;
        }

        .step-heading {
          margin-bottom: 18px;
        }

        .type-card {
          min-height: 132px;
          padding: 15px;
        }

        .type-icon {
          width: 44px;
          height: 44px;
          margin: 12px 0 10px;
          border-radius: 15px;
        }

        .type-icon svg {
          width: 27px;
          height: 27px;
        }

        .prompt-options.enhanced {
          margin: 14px 0 12px;
          padding: 9px 10px;
          border-radius: 16px;
        }

        .choice-field {
          grid-template-columns: 60px minmax(0, 1fr);
          gap: 8px;
        }

        .choice-title {
          font-size: 12px;
        }

        .choice-grid,
        .choice-grid.format-grid {
          display: flex;
          grid-template-columns: none;
        }

        .choice-button {
          min-height: 32px;
          padding: 0 11px;
          border-radius: 999px;
        }

        .choice-button strong {
          font-size: 12px;
        }

        .selected-summary {
          margin: -1px 0 12px;
          padding: 9px 10px;
          border-radius: 15px;
        }

        .selected-summary-head {
          gap: 8px;
        }

        .mobile-category-field {
          display: none;
        }

        .category-tabs {
          display: flex;
          margin: 0 -15px 14px;
          padding: 0 15px 12px;
          overflow-x: auto;
          scroll-padding-left: 15px;
          scroll-snap-type: x proximity;
          -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
          display: none;
        }

        .category-tab {
          min-height: 42px;
          scroll-snap-align: start;
          white-space: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="VisPrompt Studio ホーム">
        <span class="brand-mark" aria-hidden="true">V</span>
        <span>
          <strong>VisPrompt</strong>
          <small>Studio</small>
        </span>
      </a>
      <div class="header-meta">
        <span class="step-pill" id="stepPill">STEP 1 / 3</span>
        <button class="icon-button" id="headerReset" type="button" aria-label="選択をリセット" title="リセット">
          ↻
        </button>
      </div>
    </header>

    <main>
      <section class="hero" id="typeSection">
        <div class="eyebrow">VISUAL PROMPT BUILDER</div>
        <h1>見て、選んで、<br /><span>プロンプトにする。</span></h1>
        <p>言葉にしづらいイメージも、好きな要素を選ぶだけ。画像生成AIに伝わる指示へ整えます。</p>
        <div class="step-heading">
          <span>01</span>
          <div>
            <h2>何を作りたいですか？</h2>
            <p>まずは制作タイプをひとつ選びます</p>
          </div>
        </div>
        <div class="type-grid" id="typeGrid" aria-label="制作タイプ"></div>
      </section>

      <section class="builder hidden" id="builderSection">
        <div class="builder-main">
          <button class="back-button" id="backButton" type="button">← 制作タイプを変更</button>

          <div class="builder-title-row">
            <div>
              <div class="eyebrow" id="activeTypeLabel"></div>
              <h1>要素を選ぶ</h1>
              <p>使いたい要素をタップ。複数のカテゴリーからいくつでも選べます。</p>
            </div>
            <div class="selection-count"><strong id="selectionCount">0</strong><span>SELECTED</span></div>
          </div>

          <label class="subject-field">
            <span>作りたいもの・テーマ <em>任意</em></span>
            <input id="subjectInput" type="text" placeholder="例：雨上がりの東京を歩く白い猫" maxlength="120" />
          </label>

          <label class="subject-field negative-field">
            <span>避けたい要素 <em>任意</em></span>
            <input id="negativeInput" type="text" placeholder="例：低品質、歪み、不自然な文字" maxlength="160" />
          </label>

          <div class="prompt-options enhanced">
            <label class="prompt-mode-field native-select-only">
              <span>出力スタイル</span>
              <select id="promptMode" aria-label="出力スタイルを選択">
                <option value="standard">標準：そのまま使いやすい</option>
                <option value="short">短め：要点だけ</option>
                <option value="detailed">詳しめ：AIに細かく伝える</option>
              </select>
            </label>

            <fieldset class="choice-field" aria-labelledby="styleChoiceLabel">
              <legend class="choice-title" id="styleChoiceLabel">文量 <small>出力スタイル</small></legend>
              <div class="choice-grid" data-choice-group="promptMode">
                <button class="choice-button" type="button" data-select-target="promptMode" data-select-value="standard">
                  <strong>標準</strong><span>そのまま使いやすい</span>
                </button>
                <button class="choice-button" type="button" data-select-target="promptMode" data-select-value="short">
                  <strong>短め</strong><span>要点だけ</span>
                </button>
                <button class="choice-button" type="button" data-select-target="promptMode" data-select-value="detailed">
                  <strong>詳しめ</strong><span>細かく指示</span>
                </button>
              </div>
            </fieldset>

            <label class="prompt-mode-field native-select-only">
              <span>出力形式</span>
              <select id="promptFormat" aria-label="出力形式を選択">
                <option value="text">文章</option>
                <option value="yaml">YAML</option>
                <option value="yamlText">YAML + 文章</option>
                <option value="json">JSON</option>
              </select>
            </label>

            <fieldset class="choice-field" aria-labelledby="formatChoiceLabel">
              <legend class="choice-title" id="formatChoiceLabel">形式 <small>出力形式</small></legend>
              <div class="choice-grid format-grid" data-choice-group="promptFormat">
                <button class="choice-button" type="button" data-select-target="promptFormat" data-select-value="yaml">
                  <strong>YAML</strong><span>構造化</span>
                </button>
                <button class="choice-button" type="button" data-select-target="promptFormat" data-select-value="text">
                  <strong>文章</strong><span>貼り付け用</span>
                </button>
                <button class="choice-button" type="button" data-select-target="promptFormat" data-select-value="yamlText">
                  <strong>YAML+文</strong><span>管理と生成</span>
                </button>
                <button class="choice-button" type="button" data-select-target="promptFormat" data-select-value="json">
                  <strong>JSON</strong><span>データ用</span>
                </button>
              </div>
            </fieldset>
          </div>

          <label class="item-search-field">
            <span>アイテムを検索</span>
            <input id="itemSearch" type="search" placeholder="例：パステル、ミニマル、夕暮れ" autocomplete="off" />
          </label>

          <section class="selected-summary" aria-label="選択中のアイテム">
            <div class="selected-summary-head">
              <div>
                <span>選択中</span>
                <small>タップで解除</small>
              </div>
              <div class="selected-summary-actions">
                <button class="selected-only-toggle" id="selectedOnlyToggle" type="button" disabled>
                  選択済みだけ表示
                </button>
                <button class="selected-only-toggle" id="clearSelectedButton" type="button" disabled>
                  すべて解除
                </button>
              </div>
            </div>
            <div class="selected-chips inline" id="mainSelectedChips"></div>
          </section>

          <label class="mobile-category-field">
            <span>カテゴリーを選択</span>
            <select id="categorySelect" aria-label="カテゴリーを選択"></select>
          </label>

          <nav class="category-tabs" id="categoryTabs" aria-label="カテゴリー"></nav>
          <div class="gallery" id="gallery"></div>
        </div>

        <aside class="prompt-panel" aria-label="生成プロンプト">
          <div class="prompt-panel-head">
            <div>
              <span class="panel-kicker">LIVE PROMPT</span>
              <h2>生成プロンプト</h2>
            </div>
            <div class="prompt-panel-actions">
              <span class="live-dot">自動更新</span>
              <button class="prompt-toggle" id="promptToggle" type="button" aria-expanded="true" aria-controls="promptPanelBody">
                <span class="toggle-label">収納</span>
                <span class="toggle-icon" aria-hidden="true">⌄</span>
              </button>
            </div>
          </div>
          <div class="prompt-panel-body" id="promptPanelBody">
            <div class="selected-chips" id="selectedChips"></div>
            <label class="prompt-box">
              <span class="sr-only">生成されたプロンプト</span>
              <textarea id="promptOutput" rows="9" placeholder="要素を選ぶと、ここにプロンプトが生成されます。"></textarea>
            </label>
            <div class="prompt-stats">
              <span id="charCount">0文字</span>
              <span id="promptFormatLabel">文章プロンプト</span>
            </div>
            <button class="copy-button" id="copyButton" type="button" disabled>
              <span aria-hidden="true">▣</span> プロンプトをコピー
            </button>
            <button class="text-button" id="resetButton" type="button">すべての選択をリセット</button>
          </div>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite">コピーしました</div>

    <script src="./data.js"></script>
    <script>
      (() => {
        const stroke = "#6558f5";
        const fill = "#ebe8ff";
        const icon = (body) => `<svg viewBox="0 0 48 48" role="img" focusable="false" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">${body}</svg>`;
        const iconMap = {
          illustration: icon(`<path d="M12 30c0-9 7-16 17-16 6 0 11 4 11 9 0 4-3 7-7 7h-3c-2 0-3 2-2 4 1 3-2 6-6 6-6 0-10-4-10-10Z" fill="${fill}" stroke="${stroke}" stroke-width="3"/><circle cx="21" cy="22" r="2" fill="${stroke}"/><circle cx="29" cy="21" r="2" fill="${stroke}"/><circle cx="34" cy="26" r="2" fill="${stroke}"/><path d="M13 35l-5 5" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/>`),
          character: icon(`<circle cx="24" cy="16" r="7" fill="${fill}" stroke="${stroke}" stroke-width="3"/><path d="M12 39c2-8 7-12 12-12s10 4 12 12" fill="none" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><path d="M17 33c4 3 10 3 14 0" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/>`),
          photo: icon(`<rect x="9" y="14" width="30" height="22" rx="5" fill="none" stroke="${stroke}" stroke-width="3"/><path d="M15 14l3-5h12l3 5" fill="none" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/><circle cx="24" cy="25" r="7" fill="${fill}" stroke="${stroke}" stroke-width="3"/><circle cx="35" cy="18" r="1.8" fill="${stroke}"/>`),
          fashion: icon(`<path d="M17 10l7 4 7-4 7 7-5 6-3-3v18H18V20l-3 3-5-6 7-7Z" fill="${fill}" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/><path d="M20 12c1 4 7 4 8 0" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/>`),
          logo: icon(`<path d="M24 8l16 16-16 16L8 24 24 8Z" fill="${fill}" stroke="${stroke}" stroke-width="3"/><path d="M19 24h10M24 19v10" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/>`),
          product: icon(`<path d="M10 17l14-8 14 8v15l-14 8-14-8V17Z" fill="${fill}" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/><path d="M10 17l14 8 14-8M24 25v15" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/>`),
          interior: icon(`<path d="M9 24l15-13 15 13" fill="none" stroke="${stroke}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 22v16h20V22" fill="${fill}" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/><path d="M20 38v-9h8v9" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/>`),
          web: icon(`<rect x="8" y="11" width="32" height="24" rx="4" fill="none" stroke="${stroke}" stroke-width="3"/><path d="M8 18h32" stroke="${stroke}" stroke-width="3"/><path d="M15 25h10M15 30h18" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><circle cx="14" cy="15" r="1.5" fill="${fill}"/><circle cx="20" cy="15" r="1.5" fill="${fill}"/>`),
          landing: icon(`<rect x="10" y="9" width="28" height="30" rx="4" fill="none" stroke="${stroke}" stroke-width="3"/><path d="M16 16h16M16 23h10M16 30h16" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><path d="M29 22l6 6-6 6" fill="none" stroke="${stroke}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>`),
          app: icon(`<rect x="15" y="7" width="18" height="34" rx="5" fill="none" stroke="${stroke}" stroke-width="3"/><path d="M21 13h6M22 36h4" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><rect x="19" y="18" width="10" height="12" rx="3" fill="${fill}"/>`),
          social: icon(`<rect x="10" y="12" width="28" height="24" rx="6" fill="none" stroke="${stroke}" stroke-width="3"/><path d="M21 19l10 5-10 5V19Z" fill="${fill}" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/><path d="M15 39l5-5" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/>`),
          slide: icon(`<rect x="9" y="10" width="30" height="24" rx="4" fill="none" stroke="${stroke}" stroke-width="3"/><path d="M15 17h12M15 23h18M15 29h8" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><path d="M24 34v6" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/><circle cx="33" cy="29" r="3" fill="${fill}"/>`),
          other: icon(`<circle cx="24" cy="24" r="16" fill="none" stroke="${stroke}" stroke-width="3"/><path d="M24 16v16M16 24h16" stroke="${stroke}" stroke-width="5" stroke-linecap="round"/>`),
        };
        if (!window.VIS_PROMPT_TYPES) return;
        window.VIS_PROMPT_TYPES.forEach((type) => {
          if (iconMap[type.id]) type.icon = iconMap[type.id];
        });
      })();
    </script>
    <script src="./app.js"></script>
    <script>
      (() => {
        function syncChoiceGroup(selectId) {
          const select = document.querySelector(`#${selectId}`);
          if (!select) return;
          document.querySelectorAll(`[data-select-target="${selectId}"]`).forEach((button) => {
            const active = button.dataset.selectValue === select.value;
            button.classList.toggle("active", active);
            button.setAttribute("aria-pressed", String(active));
          });
        }

        function setSelectValue(selectId, value) {
          const select = document.querySelector(`#${selectId}`);
          if (!select || select.value === value) return;
          select.value = value;
          select.dispatchEvent(new Event("change", { bubbles: true }));
          syncChoiceGroup(selectId);
        }

        document.querySelectorAll("[data-select-target]").forEach((button) => {
          button.addEventListener("click", () => {
            setSelectValue(button.dataset.selectTarget, button.dataset.selectValue);
          });
        });

        ["promptMode", "promptFormat"].forEach((selectId) => {
          const select = document.querySelector(`#${selectId}`);
          if (!select) return;
          select.addEventListener("change", () => syncChoiceGroup(selectId));
          syncChoiceGroup(selectId);
        });
      })();
    </script>
    <script>
      (() => {
        const output = document.querySelector("#promptOutput");
        const format = document.querySelector("#promptFormat");
        const button = document.querySelector("#copyButton");
        const toast = document.querySelector("#toast");
        if (!output || !format || !button) return;

        function extractImagePrompt(value) {
          const marker = "image_prompt: |";
          const index = value.indexOf(marker);
          if (index === -1) return value.trim();
          return value
            .slice(index + marker.length)
            .split("\n")
            .map((line) => line.replace(/^  /, ""))
            .join("\n")
            .trim();
        }

        function copyLabel() {
          return format.value === "yamlText" ? "画像生成文をコピー" : "プロンプトをコピー";
        }

        function updateCopyButtonLabel() {
          button.innerHTML = `<span aria-hidden="true">▣</span> ${copyLabel()}`;
        }

        async function copyText(value) {
          if (!value) return;
          try {
            await navigator.clipboard.writeText(value);
          } catch {
            const previous = output.value;
            output.value = value;
            output.select();
            document.execCommand("copy");
            output.value = previous;
          }
          button.innerHTML = '<span aria-hidden="true">✓</span> コピーしました';
          if (toast) {
            toast.textContent = "コピーしました";
            toast.classList.add("show");
          }
          window.setTimeout(() => {
            if (toast) toast.classList.remove("show");
            updateCopyButtonLabel();
          }, 1800);
        }

        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopImmediatePropagation();
          const value = format.value === "yamlText" ? extractImagePrompt(output.value) : output.value.trim();
          copyText(value);
        }, true);

        format.addEventListener("change", () => window.setTimeout(updateCopyButtonLabel, 0));
        updateCopyButtonLabel();
      })();
    </script>
    <script>
      (() => {
        const summary = document.querySelector(".selected-summary");
        const chips = document.querySelector("#mainSelectedChips");
        if (!summary || !chips) return;

        function syncSelectedSummary() {
          summary.classList.toggle("hidden", !chips.querySelector(".selected-chip"));
        }

        new MutationObserver(syncSelectedSummary).observe(chips, {
          childList: true,
          subtree: true
        });
        syncSelectedSummary();
      })();
    </script>
    <script>
      (() => {
        const tabs = document.querySelector("#categoryTabs");
        if (!tabs) return;

        function syncCategoryCounts() {
          tabs.querySelectorAll(".category-tab span").forEach((count) => {
            count.hidden = count.textContent.trim() === "0";
          });
        }

        new MutationObserver(syncCategoryCounts).observe(tabs, {
          childList: true,
          subtree: true
        });
        syncCategoryCounts();
      })();
    </script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6558f5" />
    <meta
      name="description"
      content="参考画像を選ぶだけで画像生成AI向けプロンプトを組み立てられるツール"
    />
    <title>VisPrompt Studio</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .step-pill {
        display: none !important;
      }

      .hero {
        padding: clamp(34px, 5vw, 70px) 24px 56px;
      }

      .hero > h1 {
        font-size: clamp(34px, 5vw, 62px);
        letter-spacing: -0.04em;
      }

      .hero > p {
        margin: 18px 0 42px;
      }

      .type-icon {
        display: inline-grid;
        width: 48px;
        height: 48px;
        margin: 14px 0 13px;
        place-items: center;
        border-radius: 16px;
        background: var(--accent-soft);
        color: var(--accent-dark);
        font-size: 24px;
        font-weight: 800;
        line-height: 1;
      }

      .image-card.text-only .compact-status {
        display: none;
      }

      .image-card.text-only {
        min-height: 96px;
      }

      .image-card.text-only .compact-choice {
        gap: 8px;
      }

      @media (max-width: 760px) {
        .site-header {
          height: 64px;
        }

        .hero {
          padding: 26px 16px 36px;
        }

        .eyebrow {
          margin-bottom: 10px;
        }

        .hero > h1 {
          font-size: clamp(31px, 8.8vw, 42px);
          line-height: 1.12;
        }

        .hero > h1 span::after {
          bottom: 1px;
          height: 7px;
        }

        .hero > p {
          margin: 14px 0 30px;
          font-size: 14px;
          line-height: 1.65;
        }

        .step-heading {
          margin-bottom: 18px;
        }

        .type-card {
          min-height: 132px;
          padding: 15px;
        }

        .type-icon {
          width: 42px;
          height: 42px;
          margin: 12px 0 10px;
          border-radius: 14px;
          font-size: 21px;
        }

        .mobile-category-field {
          display: none;
        }

        .category-tabs {
          display: flex;
          margin: 0 -15px 14px;
          padding: 0 15px 12px;
          overflow-x: auto;
          scroll-padding-left: 15px;
          scroll-snap-type: x proximity;
          -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
          display: none;
        }

        .category-tab {
          min-height: 42px;
          scroll-snap-align: start;
          white-space: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#" aria-label="VisPrompt Studio ホーム">
        <span class="brand-mark" aria-hidden="true">V</span>
        <span>
          <strong>VisPrompt</strong>
          <small>Studio</small>
        </span>
      </a>
      <div class="header-meta">
        <span class="step-pill" id="stepPill">STEP 1 / 3</span>
        <button class="icon-button" id="headerReset" type="button" aria-label="選択をリセット" title="リセット">
          ↻
        </button>
      </div>
    </header>

    <main>
      <section class="hero" id="typeSection">
        <div class="eyebrow">VISUAL PROMPT BUILDER</div>
        <h1>見て、選んで、<br /><span>プロンプトにする。</span></h1>
        <p>言葉にしづらいイメージも、好きな要素を選ぶだけ。画像生成AIに伝わる指示へ整えます。</p>
        <div class="step-heading">
          <span>01</span>
          <div>
            <h2>何を作りたいですか？</h2>
            <p>まずは制作タイプをひとつ選びます</p>
          </div>
        </div>
        <div class="type-grid" id="typeGrid" aria-label="制作タイプ"></div>
      </section>

      <section class="builder hidden" id="builderSection">
        <div class="builder-main">
          <button class="back-button" id="backButton" type="button">← 制作タイプを変更</button>

          <div class="builder-title-row">
            <div>
              <div class="eyebrow" id="activeTypeLabel"></div>
              <h1>要素を選ぶ</h1>
              <p>使いたい要素をタップ。複数のカテゴリーからいくつでも選べます。</p>
            </div>
            <div class="selection-count"><strong id="selectionCount">0</strong><span>SELECTED</span></div>
          </div>

          <label class="subject-field">
            <span>作りたいもの・テーマ <em>任意</em></span>
            <input id="subjectInput" type="text" placeholder="例：雨上がりの東京を歩く白い猫" maxlength="120" />
          </label>

          <label class="subject-field negative-field">
            <span>避けたい要素 <em>任意</em></span>
            <input id="negativeInput" type="text" placeholder="例：低品質、歪み、不自然な文字" maxlength="160" />
          </label>

          <div class="prompt-options">
            <label class="prompt-mode-field">
              <span>出力スタイル</span>
              <select id="promptMode" aria-label="出力スタイルを選択">
                <option value="standard">標準：そのまま使いやすい</option>
                <option value="short">短め：要点だけ</option>
                <option value="detailed">詳しめ：AIに細かく伝える</option>
              </select>
            </label>

            <label class="prompt-mode-field">
              <span>出力形式</span>
              <select id="promptFormat" aria-label="出力形式を選択">
                <option value="text">文章</option>
                <option value="yaml">YAML</option>
                <option value="yamlText">YAML + 文章</option>
                <option value="json">JSON</option>
              </select>
            </label>
          </div>

          <label class="item-search-field">
            <span>アイテムを検索</span>
            <input id="itemSearch" type="search" placeholder="例：パステル、ミニマル、夕暮れ" autocomplete="off" />
          </label>

          <section class="selected-summary" aria-label="選択中のアイテム">
            <div class="selected-summary-head">
              <div>
                <span>選択中</span>
                <small>タップで解除</small>
              </div>
              <div class="selected-summary-actions">
                <button class="selected-only-toggle" id="selectedOnlyToggle" type="button" disabled>
                  選択済みだけ表示
                </button>
                <button class="selected-only-toggle" id="clearSelectedButton" type="button" disabled>
                  すべて解除
                </button>
              </div>
            </div>
            <div class="selected-chips inline" id="mainSelectedChips"></div>
          </section>

          <label class="mobile-category-field">
            <span>カテゴリーを選択</span>
            <select id="categorySelect" aria-label="カテゴリーを選択"></select>
          </label>

          <nav class="category-tabs" id="categoryTabs" aria-label="カテゴリー"></nav>
          <div class="gallery" id="gallery"></div>
        </div>

        <aside class="prompt-panel" aria-label="生成プロンプト">
          <div class="prompt-panel-head">
            <div>
              <span class="panel-kicker">LIVE PROMPT</span>
              <h2>生成プロンプト</h2>
            </div>
            <div class="prompt-panel-actions">
              <span class="live-dot">自動更新</span>
              <button class="prompt-toggle" id="promptToggle" type="button" aria-expanded="true" aria-controls="promptPanelBody">
                <span class="toggle-label">収納</span>
                <span class="toggle-icon" aria-hidden="true">⌄</span>
              </button>
            </div>
          </div>
          <div class="prompt-panel-body" id="promptPanelBody">
            <div class="selected-chips" id="selectedChips"></div>
            <label class="prompt-box">
              <span class="sr-only">生成されたプロンプト</span>
              <textarea id="promptOutput" rows="9" placeholder="要素を選ぶと、ここにプロンプトが生成されます。"></textarea>
            </label>
            <div class="prompt-stats">
              <span id="charCount">0文字</span>
              <span id="promptFormatLabel">文章プロンプト</span>
            </div>
            <button class="copy-button" id="copyButton" type="button" disabled>
              <span aria-hidden="true">▣</span> プロンプトをコピー
            </button>
            <button class="text-button" id="resetButton" type="button">すべての選択をリセット</button>
          </div>
        </aside>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite">コピーしました</div>

    <script src="./data.js"></script>
    <script>
      (() => {
        const iconMap = {
          illustration: "🎨",
          character: "👤",
          photo: "📷",
          fashion: "👕",
          logo: "◆",
          product: "📦",
          interior: "⌂",
          web: "🖥",
          landing: "▤",
          app: "📱",
          social: "▶",
          slide: "▣",
          other: "＋",
        };
        if (!window.VIS_PROMPT_TYPES) return;
        window.VIS_PROMPT_TYPES.forEach((type) => {
          if (iconMap[type.id]) type.icon = iconMap[type.id];
        });
      })();
    </script>
    <script src="./app.js"></script>
    <script>
      (() => {
        const output = document.querySelector("#promptOutput");
        const format = document.querySelector("#promptFormat");
        const button = document.querySelector("#copyButton");
        const toast = document.querySelector("#toast");
        if (!output || !format || !button) return;

        function extractImagePrompt(value) {
          const marker = "image_prompt: |";
          const index = value.indexOf(marker);
          if (index === -1) return value.trim();
          return value
            .slice(index + marker.length)
            .split("\n")
            .map((line) => line.replace(/^  /, ""))
            .join("\n")
            .trim();
        }

        function copyLabel() {
          return format.value === "yamlText" ? "画像生成文をコピー" : "プロンプトをコピー";
        }

        function updateCopyButtonLabel() {
          button.innerHTML = `<span aria-hidden="true">▣</span> ${copyLabel()}`;
        }

        async function copyText(value) {
          if (!value) return;
          try {
            await navigator.clipboard.writeText(value);
          } catch {
            const previous = output.value;
            output.value = value;
            output.select();
            document.execCommand("copy");
            output.value = previous;
          }
          button.innerHTML = '<span aria-hidden="true">✓</span> コピーしました';
          if (toast) {
            toast.textContent = "コピーしました";
            toast.classList.add("show");
          }
          window.setTimeout(() => {
            if (toast) toast.classList.remove("show");
            updateCopyButtonLabel();
          }, 1800);
        }

        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopImmediatePropagation();
          const value = format.value === "yamlText" ? extractImagePrompt(output.value) : output.value.trim();
          copyText(value);
        }, true);

        format.addEventListener("change", () => window.setTimeout(updateCopyButtonLabel, 0));
        updateCopyButtonLabel();
      })();
    </script>
  </body>
</html>
